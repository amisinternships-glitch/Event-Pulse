[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/events/today"
  to = "/.netlify/functions/events-today"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    
[functions]
  directory = "netlify/functions"

