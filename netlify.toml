[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/events/today"
  to = "/.netlify/functions/events-today"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    
[functions]
  directory = "netlify/functions"

[[functions.schedule]]
  path = "/refresh-today-events"
  schedule = "0 5 * * *" # 5:00 UTC = 12:00 AM CT (UTC-6 / CDT UTC-5)
